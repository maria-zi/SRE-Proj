events { # Секция событий (worker processes)
    worker_connections 1024;   # Максимальное количество одновременных соединений на worker
}

http {  # HTTP секция
    upstream backend {   # Upstream = группа серверов для балансировки (здесь один сервер)
        server app:8000;  # Backend-сервер: сервис app в docker-compose/k8s, порт 8000
    }

    server {     # Конфигурация виртуального хоста
        listen 80;   # Порт прослушивания
        server_name localhost;    # Имя хоста (можно использовать для virtual host)

         # Keep-alive настройки (долгие соединения)
        keepalive_timeout 65;  # тайм-утKeep-alive 65 секунд
        keepalive_requests 100;   # макс 100 запросов на одно соединение

        location / {  # Все запросы (root path)
            proxy_pass http://backend;  # Проксируем запросы к upstream backend
            # Заголовки для прокси
            proxy_set_header Host $host;  # оригинальный хост
            proxy_set_header X-Real-IP $remote_addr;  # реальный IP клиента
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # цепочка прокси
            proxy_http_version 1.1; # HTTP 1.1 (поддержка keep-alive)
            proxy_set_header Connection ""; # очищаем Connection заголовок
        }

        location /health {     # Health check endpoint (для мониторинга)
            access_log off;   # не логировать health checks (меньше логов)
            return 200 "healthy\n";    # возвращаем "healthy" с кодом 200
            add_header Content-Type text/plain;  # Content-Type = text/plain
        }
    }
}
