apiVersion: autoscaling/v2  # HorizontalPodAutoscaler — автоскейлинг подов
kind: HorizontalPodAutoscaler
metadata:
  name: telecom-api-hpa             # имя HPA
spec:
  scaleTargetRef:          # какой объект скейлить
    apiVersion: apps/v1
    kind: Deployment
    name: telecom-api             # Deployment для скейлинга
  minReplicas: 3                 # минимальное количество подов (даже если нагрузка 0)
  maxReplicas: 10                    # максимальное количество подов
  metrics:                           # метрики для скейлинга
  - type: Resource                  # ресурсная метрика
    resource:
      name: cpu
      target:
        type: Utilization                # процент использования
        averageUtilization: 70            # скейслить если среднее > 70%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80                 # скейлить если среднее > 80%
