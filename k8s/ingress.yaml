apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telecom-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: telecom.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: telecom-api
            port:
              number: 80
