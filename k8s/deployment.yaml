apiVersion: apps/v1  # Deployment для API (3 реплики)
kind: Deployment
metadata:
  name: telecom-api  # имя Deployment'а
  labels:
    app: telecom-api  # лейбл для селектора
spec:
  replicas: 3  # 3 пода одновременно (high availability)
  selector:
    matchLabels:
      app: telecom-api   # какие поды выбирать (по лейблу)
  template:
    metadata:
      labels:
        app: telecom-api  # лейбл пода (должен совпадать с selector)
    spec:
      containers:
      - name: telecom-api   # имя контейнера
        image: telecom-api:latest  # Docker образ
        ports:
        - containerPort: 8000  # порт внутри контейнера
        resources:
          requests:
            memory: "128Mi"   # минимальная память (гарантируется)
            cpu: "100m"    # минимальная CPU (100m = 0.1 CPU)
          limits:
            memory: "256Mi"    # максимальная память (hard limit)
            cpu: "200m"    # максимальная CPU
        livenessProbe:    # проверка живости (если не проходит → перезапуск пода)
          httpGet:
            path: /health    # путь для health check
            port: 8000
          initialDelaySeconds: 10    # ждать 10 сек перед первой проверкой
          periodSeconds: 5     # проверять каждые 5 сек
        readinessProbe:     # готовность (если не проходит — не включать в Service)
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
        env:                            # переменные окружения
        - name: DATABASE_URL         # имя переменной
          valueFrom:
            secretKeyRef:                # берём из Secret
              name: telecom-secret
              key: database-url
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:               # берём из ConfigMap
              name: telecom-config
              key: redis-host
---
apiVersion: apps/v1      # Deployment для PostgreSQL (1 реплика)
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1         # одна база (главное — не реплицировать без настройки)
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432        # стандартный порт PostgreSQL
        env:
        - name: POSTGRES_DB
          value: telecom
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: telecom-secret
              key: db-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: telecom-secret
              key: db-password
        volumeMounts:             # монтирование тома
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:                           # определение тома
      - name: pgdata
        persistentVolumeClaim:         # используем PVC
          claimName: postgres-pvc          # имя PVC (из pvc.yaml)
---
apiVersion: apps/v1          # Deployment для Redis (1 реплика)
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379         # стандартный порт Redis
