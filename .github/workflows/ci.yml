name: CI/CD with Kubernetes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov flake8
      
      - name: Run lint
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Helm lint
        run: |
          helm lint helm/telecom-chart || echo "Helm not installed, skipping"
      
      - name: Build Docker
        run: |
          docker build -t telecom-api:test .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
      
      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install telecom ./helm/telecom-chart \
            --namespace telecom \
            --create-namespace \
            --set image.tag=latest
      
      - name: Verify deployment
        run: |
          kubectl get pods -n telecom
          kubectl get hpa -n telecom
